name: Surge Rules CI

on:
  push:
    paths:
      - 'surge/**'
      - 'tools/**'
      - '.github/workflows/**'
  pull_request:
    paths:
      - 'surge/**'
      - 'tools/**'

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate Surge rules
        run: |
          echo "Running Surge validator..."
          python tools/surge_validator.py surge/direct.list
          python tools/surge_validator.py surge/apple.list
          python tools/surge_validator.py surge/proxy.list
