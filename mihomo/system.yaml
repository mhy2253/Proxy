mixed-port: 7890
allow-lan: false
mode: rule
log-level: info
ipv6: false

tcp-concurrent: true
unified-delay: true
find-process-mode: off

profile:
  store-selected: true

sniffer:
  enable: false

tun:
  enable: false

dns:
  enable: true
  ipv6: false
  listen: 127.0.0.1:1053
  enhanced-mode: redir-host

  default-nameserver:
    - tls://223.5.5.5
    - tls://223.6.6.6

  nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query

  fallback:
    - https://dns.google/dns-query#proxy
    - https://cloudflare-dns.com/dns-query#proxy

  fallback-filter:
    geoip: true
    geoip-code: CN

  proxy-server-nameserver:
    - tls://223.5.5.5
    - tls://223.6.6.6

proxies:
  - name: "ss"
    type: ss
    server: 13105.cc
    port: 12345
    cipher: chacha20-ietf-poly1305
    password: "REPLACE_WITH_SS_PASSWORD"
    udp: true

  - name: "trojan"
    type: trojan
    server: 13105.cc
    port: 443
    password: "REPLACE_WITH_TROJAN_PASSWORD"
    udp: true
    client-fingerprint: chrome
    sni: 13105.cc
    alpn:
      - h2
      - http/1.1
    skip-cert-verify: true

proxy-groups:
  - name: "proxy"
    type: url-test
    proxies:
      - ss
      - trojan
    url: "https://cp.cloudflare.com/generate_204"
    interval: 300
    tolerance: 50
    lazy: true

rule-anchor:
  ip: &ip
    type: http
    interval: 86400
    behavior: ipcidr
    format: mrs
    proxy: DIRECT
  domain: &domain
    type: http
    interval: 86400
    behavior: domain
    format: mrs
    proxy: DIRECT

rule-providers:
  private_domain:
    <<: *domain
    path: ./private_domain.mrs
    url: "https://123456.929413105.cc/https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/private.mrs"
  private_ip:
    <<: *ip
    path: ./private_ip.mrs
    url: "https://123456.929413105.cc/https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/private.mrs"
  openai:
    <<: *domain
    path: ./openai.mrs
    url: "https://123456.929413105.cc/https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/openai.mrs"
  anthropic:
    <<: *domain
    path: ./anthropic.mrs
    url: "https://123456.929413105.cc/https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/anthropic.mrs"
  perplexity:
    <<: *domain
    path: ./perplexity.mrs
    url: "https://123456.929413105.cc/https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/perplexity.mrs"
  notion:
    <<: *domain
    path: ./notion.mrs
    url: "https://123456.929413105.cc/https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/notion.mrs"
  github:
    <<: *domain
    path: ./github.mrs
    url: "https://123456.929413105.cc/https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/github.mrs"
  dropbox:
    <<: *domain
    path: ./dropbox.mrs
    url: "https://123456.929413105.cc/https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/dropbox.mrs"
  google:
    <<: *domain
    path: ./google.mrs
    url: "https://123456.929413105.cc/https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/google.mrs"
  geolocation_not_cn:
    <<: *domain
    path: ./geolocation-not-cn.mrs
    url: "https://123456.929413105.cc/https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/geolocation-!cn.mrs"

rules:
  - RULE-SET,private_domain,DIRECT
  - RULE-SET,private_ip,DIRECT,no-resolve

  - RULE-SET,openai,proxy
  - RULE-SET,anthropic,proxy
  - RULE-SET,perplexity,proxy
  - RULE-SET,notion,proxy
  - RULE-SET,github,proxy
  - RULE-SET,dropbox,proxy
  - RULE-SET,google,proxy
  - RULE-SET,geolocation_not_cn,proxy

  - MATCH,DIRECT
