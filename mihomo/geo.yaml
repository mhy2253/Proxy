mixed-port: 7890
allow-lan: true
mode: rule
log-level: info
ipv6: true
udp: true
external-controller: 127.0.0.1:9090
external-ui: ui
external-ui-url: "https://github.com/MetaCubeX/metacubexd/archive/refs/heads/gh-pages.zip"

unified-delay: true
geodata-mode: true
geodata-loader: standard
geo-auto-update: true
geo-update-interval: 24
tcp-concurrent: true
find-process-mode: strict 
global-client-fingerprint: chrome

geodata-mode: true
geox-url:
  geoip: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip-lite.dat"
  geosite: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat"
  mmdb: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/country-lite.mmdb"
  asn: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/GeoLite2-ASN.mmdb"

profile:
  store-selected: true
  store-fake-ip: true

sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - "Mijia Cloud"
    - "+.push.apple.com"

tun:
  enable: true
  stack: mixed
  dns-hijack:
    - "any:53"
    - "tcp://any:53"
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true

dns:
  prefer-h3: true
  listen: 0.0.0.0:53
  enable: true
  ipv6: true
  enhanced-mode: fake-ip
  fake-ip-filter:
    - "*"
    - "+.lan"
    - "+.local"
    - "+.market.xiaomi.com"
  default-nameserver:
    - 114.114.114.114
    - tls://223.5.5.5
    - tls://223.6.6.6
    - system
  nameserver:
    - 114.114.114.114
    - tls://223.5.5.5
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
    - https://dns.alidns.com/dns-query#h3=true
proxies:
  - name: "ss"
    type: ss
    server: server
    port: 443
    cipher: chacha20-ietf-poly1305
    password: "password"
  - name: "trojan"
    type: trojan
    server: server
    port: 443
    password: yourpsk
    udp: true
    sni: example.com
    alpn:
      - h2
      - http/1.1
    skip-cert-verify: true
  - name: "hysteria2"
    type: hysteria2
    server: server.com
    port: 443
    #  up 和 down 均不写或为 0 则使用 BBR 流控
    # up: "30 Mbps" # 若不写单位，默认为 Mbps
    # down: "200 Mbps" # 若不写单位，默认为 Mbps
    password: yourpassword
    sni: server.com
    skip-cert-verify: false
    alpn:
       - h3
  - name: tuic
    server: www.example.com
    port: 10443
    type: tuic
    uuid: 00000000-0000-0000-0000-000000000001
    password: PASSWORD_1
    disable-sni: true
    reduce-rtt: true
    request-timeout: 8000
    udp-relay-mode: native # Available: "native", "quic". Default: "native"
    fast-open: true
    skip-cert-verify: true
  - name: anytls
    type: anytls
    server: 1.2.3.4
    port: 443
    password: "<your password>"
    client-fingerprint: chrome
    udp: true
    sni: "example.com"
    alpn:
       - h2
       - http/1.1
    skip-cert-verify: true
proxy-grops:
  - name: "proxy"
    type: url-test
    proxies:
      - ss1
      - ss2
      - vmess1
    url: "https://cp.cloudflare.com/generate_204"
    interval: 300


    

rules:
  - GEOIP,lan,direct,no-resolve
  - GEOSITE,apple-intelligence,proxy
  - GEOSITE,apple,direct
  - GEOSITE,anthropic,proxy
  - GEOSITE,perplexity,proxy
  - GEOSITE,notion,proxy
  - GEOSITE,discord,proxy
  - GEOSITE,github,proxy
  - GEOSITE,twitter,proxy
  - GEOSITE,x,proxy
  - GEOSITE,tiktok,proxy
  - GEOSITE,dropbox,proxy
  - GEOSITE,youtube,proxy
  - GEOSITE,google,proxy
  - GEOSITE,telegram,proxy
  - GEOSITE,netflix,proxy
  - GEOSITE,bilibili,direct
  - GEOSITE,bahamut,proxy
  - GEOSITE,spotify,proxy
  - GEOSITE,CN,direct
  - GEOSITE,geolocation-!cn,proxy

  - GEOIP,google,proxy
  - GEOIP,netflix,proxy
  - GEOIP,telegram,proxy
  - GEOIP,twitter,proxy
  - GEOIP,CN,direct
  - MATCH,proxy
